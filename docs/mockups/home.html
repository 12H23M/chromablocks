<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 393px;
    height: 852px;
    background: #0F0F1A;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* Subtle gradient bg */
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(66,185,245,0.08) 0%, rgba(167,139,223,0.05) 40%, transparent 70%);
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 60px 28px 40px;
    position: relative;
    z-index: 1;
  }

  /* Logo area */
  .logo-section {
    text-align: center;
    margin-bottom: 12px;
  }

  .logo-blocks {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .logo-block {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    box-shadow: 0 0 12px rgba(255,255,255,0.15);
  }

  .lb1 { background: #FF7E8E; box-shadow: 0 0 12px rgba(255,126,142,0.4); }
  .lb2 { background: #FFAA42; box-shadow: 0 0 12px rgba(255,170,66,0.4); }
  .lb3 { background: #FFD536; box-shadow: 0 0 12px rgba(255,213,54,0.4); }
  .lb4 { background: #5EC97B; box-shadow: 0 0 12px rgba(94,201,123,0.4); }
  .lb5 { background: #42B9F5; box-shadow: 0 0 12px rgba(66,185,245,0.4); }
  .lb6 { background: #A78BDF; box-shadow: 0 0 12px rgba(167,139,223,0.4); }

  .logo-title {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #42B9F5, #A78BDF, #FF7E8E);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-subtitle {
    font-size: 13px;
    color: #5A6480;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Buttons */
  .buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 36px;
  }

  .btn {
    width: 100%;
    padding: 18px 24px;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, #42B9F5, #6C5CE7);
    color: #FFFFFF;
    box-shadow: 0 4px 20px rgba(66,185,245,0.35);
    font-size: 19px;
    padding: 20px 24px;
    justify-content: center;
  }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: #FFFFFF;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .btn-daily {
    background: linear-gradient(135deg, rgba(255,170,66,0.15), rgba(255,213,54,0.1));
    color: #FFD536;
    border: 1px solid rgba(255,213,54,0.2);
  }

  .btn-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
  }

  .btn-badge {
    margin-left: auto;
    background: rgba(255,213,54,0.2);
    color: #FFD536;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .btn-streak {
    margin-left: auto;
    font-size: 13px;
    opacity: 0.7;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: auto;
    margin-bottom: 24px;
  }

  .stat-card {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: #FFFFFF;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    color: #5A6480;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-card:nth-child(1) .stat-value { color: #FFD536; }
  .stat-card:nth-child(2) .stat-value { color: #42B9F5; }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    width: 100%;
  }

  .bottom-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #5A6480;
    font-size: 14px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 12px;
    transition: all 0.2s;
  }

  .bottom-btn:hover {
    background: rgba(255,255,255,0.05);
    color: #8892B0;
  }

  .bottom-icon {
    font-size: 18px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-blocks">
        <div class="logo-block lb1"></div>
        <div class="logo-block lb2"></div>
        <div class="logo-block lb3"></div>
        <div class="logo-block lb4"></div>
        <div class="logo-block lb5"></div>
        <div class="logo-block lb6"></div>
      </div>
      <div class="logo-title">ChromaBlocks</div>
      <div class="logo-subtitle">Block Puzzle</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn btn-primary">
        <span>▶</span> New Game
      </button>
      
      <button class="btn btn-secondary">
        <span class="btn-icon">↩</span>
        Continue
        <span class="btn-streak">Lv.12 · 4,280</span>
      </button>

      <button class="btn btn-daily">
        <span class="btn-icon">📅</span>
        Daily Challenge
        <span class="btn-badge">🔥 7 Days</span>
      </button>

      <button class="btn btn-secondary">
        <span class="btn-icon">📖</span>
        How to Play
      </button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">12,480</div>
        <div class="stat-label">Best</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">47</div>
        <div class="stat-label">Games</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">3,820</div>
        <div class="stat-label">Average</div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <button class="bottom-btn">
        <span class="bottom-icon">🔊</span> Sound
      </button>
      <button class="bottom-btn">
        <span class="bottom-icon">⚙️</span> Settings
      </button>
    </div>
  </div>
</body>
</html>
