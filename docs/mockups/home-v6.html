<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 393px;
    height: 852px;
    font-family: 'Fredoka', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
    background: #110d30;
  }

  .bg {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(120,100,200,0.04) 39px, rgba(120,100,200,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(120,100,200,0.04) 39px, rgba(120,100,200,0.04) 40px),
      radial-gradient(ellipse at 50% 0%, #2d1b69 0%, #1a1145 50%, #0f0d2e 100%);
  }

  /* Sparkles */
  .sparkle { position:absolute; border-radius:50%; z-index:1; background:#fff; }
  .sp1 { width:3px; height:3px; top:95px; left:45px; opacity:0.4; }
  .sp2 { width:2px; height:2px; top:200px; right:55px; opacity:0.3; }
  .sp3 { width:3px; height:3px; top:330px; left:70px; opacity:0.35; }
  .sp4 { width:2px; height:2px; top:480px; right:80px; opacity:0.25; }
  .sp5 { width:4px; height:4px; top:150px; left:320px; opacity:0.2; }
  .sp6 { width:2px; height:2px; top:570px; left:40px; opacity:0.3; }
  .sp7 { width:3px; height:3px; top:620px; right:50px; opacity:0.25; }
  .sp8 { width:2px; height:2px; top:720px; left:100px; opacity:0.2; }

  /* Floating blocks */
  .deco {
    position:absolute; border-radius:7px; z-index:1; transform:rotate(var(--r));
    border-bottom:3px solid rgba(0,0,0,0.3);
  }
  .deco::after { content:''; position:absolute; top:2px; left:3px; right:5px; height:35%; background:rgba(255,255,255,0.22); border-radius:4px; }
  .dc1 { width:36px; height:36px; background:#FF7E8E; top:100px; left:-6px; --r:18deg; opacity:0.2; }
  .dc2 { width:24px; height:24px; background:#42B9F5; top:180px; right:14px; --r:-22deg; opacity:0.17; }
  .dc3 { width:44px; height:18px; background:#FFD536; bottom:220px; left:8px; --r:28deg; opacity:0.14; }
  .dc4 { width:18px; height:44px; background:#5EC97B; bottom:180px; right:16px; --r:-12deg; opacity:0.16; }
  .dc5 { width:20px; height:20px; background:#A78BDF; top:420px; left:14px; --r:35deg; opacity:0.12; }
  .dc6 { width:28px; height:28px; background:#FFAA42; top:380px; right:10px; --r:-28deg; opacity:0.14; }

  .glow { position:absolute; border-radius:50%; filter:blur(70px); z-index:1; }
  .g1 { width:220px; height:220px; background:rgba(66,185,245,0.1); top:20px; right:-80px; }
  .g2 { width:280px; height:280px; background:rgba(167,139,223,0.08); bottom:60px; left:-100px; }
  .g3 { width:160px; height:160px; background:rgba(255,126,142,0.06); top:380px; left:50px; }

  .container {
    display:flex; flex-direction:column; align-items:center;
    height:100%; padding:44px 24px 24px;
    position:relative; z-index:2;
  }

  /* ═══ LOGO ═══ */
  .logo-wrap { text-align:center; }

  .logo-star {
    font-size:20px; margin-bottom:6px;
    color: #FFD700;
    filter: drop-shadow(0 2px 8px rgba(255,215,0,0.5));
    display:inline-block;
  }

  .logo-blocks { display:flex; gap:5px; justify-content:center; margin-bottom:12px; }

  .logo-block {
    width:40px; height:40px; border-radius:10px;
    position:relative;
    border-bottom:5px solid rgba(0,0,0,0.35);
  }
  .logo-block::before {
    content:''; position:absolute; inset:0; border-radius:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
  }
  .logo-block::after {
    content:''; position:absolute; top:4px; left:5px; width:10px; height:10px;
    background:rgba(255,255,255,0.4); border-radius:50%; filter:blur(2px);
  }
  .lb1 { background: linear-gradient(180deg, #FF9EAA, #FF6E80); box-shadow:0 0 22px rgba(255,126,142,0.5); }
  .lb2 { background: linear-gradient(180deg, #FFC060, #FF9A30); box-shadow:0 0 22px rgba(255,170,66,0.5); }
  .lb3 { background: linear-gradient(180deg, #FFE060, #FFCC20); box-shadow:0 0 22px rgba(255,213,54,0.5); }
  .lb4 { background: linear-gradient(180deg, #7EDB95, #4EBB6B); box-shadow:0 0 22px rgba(94,201,123,0.5); }
  .lb5 { background: linear-gradient(180deg, #62CCF8, #32A8E8); box-shadow:0 0 22px rgba(66,185,245,0.5); }
  .lb6 { background: linear-gradient(180deg, #BFA4E8, #9070D0); box-shadow:0 0 22px rgba(167,139,223,0.5); }

  .logo-title {
    font-size:44px; font-weight:700; line-height:1;
    color:#fff;
    text-shadow: 0 0 30px rgba(167,139,223,0.4), 0 4px 10px rgba(0,0,0,0.5);
    margin-bottom:2px;
  }
  .logo-title span { color:#d4c6ff; }
  .logo-sub {
    font-size:12px; color:#8B7AB8; letter-spacing:8px;
    text-transform:uppercase; font-weight:500;
  }

  /* ═══ MINI BOARD ═══ */
  .board-frame {
    margin:16px 0 6px; padding:12px;
    background: linear-gradient(180deg, rgba(30,20,70,0.9) 0%, rgba(15,13,46,0.95) 100%);
    border-radius:16px;
    border:2px solid rgba(120,100,200,0.2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    position:relative;
  }
  .board-frame::before {
    content:''; position:absolute; top:-1px; left:20px; right:20px; height:2px;
    background: linear-gradient(90deg, transparent, rgba(167,139,223,0.3), transparent);
  }
  .mini-board {
    display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(4,1fr);
    gap:3px; width:210px;
  }
  .mc { width:100%; aspect-ratio:1; border-radius:5px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.02); }
  .mf { border-bottom:3px solid rgba(0,0,0,0.3); position:relative; }
  .mf::before { content:''; position:absolute; inset:0; border-radius:5px; background:linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 50%); }
  .mf::after { content:''; position:absolute; top:2px; left:3px; width:5px; height:5px; background:rgba(255,255,255,0.35); border-radius:50%; filter:blur(1px); }
  .cr { background: linear-gradient(180deg, #FF9EAA, #FF6E80); }
  .co { background: linear-gradient(180deg, #FFC060, #FF9A30); }
  .cy { background: linear-gradient(180deg, #FFE060, #FFCC20); }
  .cg { background: linear-gradient(180deg, #7EDB95, #4EBB6B); }
  .cb { background: linear-gradient(180deg, #62CCF8, #32A8E8); }
  .cp { background: linear-gradient(180deg, #BFA4E8, #9070D0); }

  /* ═══ BUTTONS ═══ */
  .buttons { width:100%; display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:16px; }

  .gbtn {
    border:none; font-family:'Fredoka',sans-serif; font-weight:700;
    cursor:pointer; position:relative; text-align:center;
    text-shadow:0 2px 3px rgba(0,0,0,0.35);
    letter-spacing:0.5px; display:flex; align-items:center;
    justify-content:center; gap:10px;
  }
  .gbtn::before {
    content:''; position:absolute; top:0; left:0; right:0; height:48%;
    background:linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 60%, transparent 100%);
    border-radius:inherit; border-bottom-left-radius:0; border-bottom-right-radius:0;
    pointer-events:none;
  }

  /* Play */
  .btn-play {
    width:88%; padding:20px 32px; font-size:26px; color:#fff;
    background: linear-gradient(180deg, #6ddb8a 0%, #3cc462 50%, #28a84c 100%);
    border-radius:22px; border-bottom:7px solid #1a7a38;
    box-shadow: 0 8px 30px rgba(46,184,92,0.5), inset 0 2px 0 rgba(255,255,255,0.15);
  }
  .play-icon {
    width:36px; height:36px; background:rgba(255,255,255,0.2);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:16px; box-shadow:inset 0 -2px 0 rgba(0,0,0,0.15);
  }

  /* Continue */
  .btn-cont {
    width:80%; padding:14px 24px; font-size:18px; color:#fff;
    background: linear-gradient(180deg, #60c8f8 0%, #3aa0e0 50%, #2888cc 100%);
    border-radius:18px; border-bottom:6px solid #1a6090;
    box-shadow: 0 6px 22px rgba(59,160,224,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    flex-direction:column; gap:1px;
  }
  .cont-sub { font-size:11px; font-weight:500; opacity:0.7; }

  /* Daily */
  .btn-daily {
    width:80%; padding:14px 24px; font-size:18px; color:#fff;
    background: linear-gradient(180deg, #ffc852 0%, #f5a020 50%, #dd8810 100%);
    border-radius:18px; border-bottom:6px solid #a06008;
    box-shadow: 0 6px 22px rgba(245,160,32,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    position:relative;
  }
  .daily-fire {
    position:absolute; top:-10px; right:10px;
    background: linear-gradient(135deg, #FF4060, #FF2040);
    font-size:12px; font-weight:700;
    padding:3px 10px; border-radius:12px;
    box-shadow: 0 3px 10px rgba(255,50,80,0.55);
    border:2.5px solid #110d30;
    display:flex; align-items:center; gap:3px;
  }
  .fire-dot { width:8px; height:8px; background:#FFD536; border-radius:50%; box-shadow: 0 0 6px #FFD536; }
  .daily-sub { font-size:11px; font-weight:400; color:rgba(255,255,255,0.65); margin-top:2px; }

  /* ═══ BOTTOM SECTION ═══ */
  .bottom-area {
    margin-top: auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* How to Play — integrated into bottom as text link style */
  .btn-howto {
    font-family:'Fredoka',sans-serif;
    font-size:14px; font-weight:500;
    color:#9B8AC4;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 16px;
    letter-spacing: 0.5px;
    text-decoration: none;
    border-bottom: 1.5px solid rgba(155,138,196,0.3);
  }

  /* Stats */
  .stats {
    display:flex; gap:8px; width:100%;
  }
  .scard {
    flex:1; text-align:center; padding:12px 4px 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    border:1.5px solid rgba(255,255,255,0.06);
    border-radius:14px; border-bottom:3px solid rgba(0,0,0,0.25);
    position:relative; overflow:hidden;
  }
  .scard::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    border-radius:14px 14px 0 0;
  }
  .scard:nth-child(1)::before { background: linear-gradient(90deg, #FFD536, #FFAA42); }
  .scard:nth-child(2)::before { background: linear-gradient(90deg, #42B9F5, #62CCF8); }
  .scard:nth-child(3)::before { background: linear-gradient(90deg, #5EC97B, #7EDB95); }

  /* Stat icon — colored circle with symbol */
  .sicon {
    width:28px; height:28px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; margin-bottom:4px;
  }
  .scard:nth-child(1) .sicon { background:rgba(255,213,54,0.15); color:#FFD536; }
  .scard:nth-child(2) .sicon { background:rgba(66,185,245,0.15); color:#42B9F5; }
  .scard:nth-child(3) .sicon { background:rgba(94,201,123,0.15); color:#5EC97B; }

  .sval { font-size:20px; font-weight:700; margin-bottom:1px; }
  .slab { font-size:9px; color:#7060A0; text-transform:uppercase; letter-spacing:1.5px; font-weight:500; }
  .scard:nth-child(1) .sval { color:#FFD536; }
  .scard:nth-child(2) .sval { color:#42B9F5; }
  .scard:nth-child(3) .sval { color:#5EC97B; }

  /* Sound + Settings row */
  .utility-row {
    display:flex; justify-content:center; gap:28px;
    padding-bottom:4px;
  }
  .ubtn {
    display:flex; align-items:center; gap:6px;
    color:#6B5A98; font-family:'Fredoka',sans-serif;
    font-size:13px; font-weight:500;
    background:none; border:none; cursor:pointer;
    padding:4px 0;
  }
  /* Icon circles for utility buttons */
  .ubtn-icon {
    width:24px; height:24px; border-radius:50%;
    background: rgba(107,90,152,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:#8B7AB8;
  }
  .ubtn-divider {
    width:1px; height:16px; background:rgba(107,90,152,0.2);
    align-self:center;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="sparkle sp1"></div><div class="sparkle sp2"></div><div class="sparkle sp3"></div>
  <div class="sparkle sp4"></div><div class="sparkle sp5"></div><div class="sparkle sp6"></div>
  <div class="sparkle sp7"></div><div class="sparkle sp8"></div>
  <div class="deco dc1"></div><div class="deco dc2"></div><div class="deco dc3"></div>
  <div class="deco dc4"></div><div class="deco dc5"></div><div class="deco dc6"></div>
  <div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

  <div class="container">
    <div class="logo-wrap">
      <div class="logo-star">✦</div>
      <div class="logo-blocks">
        <div class="logo-block lb1"></div>
        <div class="logo-block lb2"></div>
        <div class="logo-block lb3"></div>
        <div class="logo-block lb4"></div>
        <div class="logo-block lb5"></div>
        <div class="logo-block lb6"></div>
      </div>
      <div class="logo-title">Chroma<span>Blocks</span></div>
      <div class="logo-sub">Block Puzzle</div>
    </div>

    <div class="board-frame">
      <div class="mini-board">
        <div class="mc"></div><div class="mc mf cr"></div><div class="mc mf cr"></div><div class="mc"></div><div class="mc"></div><div class="mc mf cb"></div><div class="mc"></div>
        <div class="mc mf co"></div><div class="mc mf cr"></div><div class="mc"></div><div class="mc mf cg"></div><div class="mc mf cg"></div><div class="mc mf cb"></div><div class="mc mf cb"></div>
        <div class="mc mf co"></div><div class="mc mf co"></div><div class="mc mf cy"></div><div class="mc mf cg"></div><div class="mc"></div><div class="mc"></div><div class="mc mf cp"></div>
        <div class="mc mf cp"></div><div class="mc"></div><div class="mc mf cy"></div><div class="mc mf cy"></div><div class="mc mf cp"></div><div class="mc mf cp"></div><div class="mc mf cp"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="gbtn btn-play"><span class="play-icon">▶</span> PLAY</button>
      <button class="gbtn btn-cont">↩ Continue<span class="cont-sub">Level 12 · 4,280 pts</span></button>
      <button class="gbtn btn-daily">
        Daily Challenge
        <span class="daily-fire"><span class="fire-dot"></span> 7</span>
      </button>
    </div>

    <div class="bottom-area">
      <button class="btn-howto">How to Play</button>

      <div class="stats">
        <div class="scard">
          <div class="sicon">★</div>
          <div class="sval">12,480</div>
          <div class="slab">Best</div>
        </div>
        <div class="scard">
          <div class="sicon">♦</div>
          <div class="sval">47</div>
          <div class="slab">Games</div>
        </div>
        <div class="scard">
          <div class="sicon">≈</div>
          <div class="sval">3,820</div>
          <div class="slab">Avg</div>
        </div>
      </div>

      <div class="utility-row">
        <button class="ubtn">
          <span class="ubtn-icon">♪</span> Sound
        </button>
        <div class="ubtn-divider"></div>
        <button class="ubtn">
          <span class="ubtn-icon">⚙</span> Settings
        </button>
      </div>
    </div>
  </div>
</body>
</html>
