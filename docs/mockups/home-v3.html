<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 393px;
    height: 852px;
    font-family: 'Fredoka', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
    background: #1a1145;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.025) 39px, rgba(255,255,255,0.025) 40px),
      linear-gradient(170deg, #2d1b69 0%, #1a1145 40%, #0f0d2e 100%);
  }

  /* Floating deco blocks */
  .deco-block { position: absolute; border-radius: 7px; z-index: 1; transform: rotate(var(--rot)); border-bottom: 3px solid rgba(0,0,0,0.25); }
  .deco-block::after { content:''; position:absolute; top:2px; left:2px; right:4px; height:35%; background:rgba(255,255,255,0.2); border-radius:4px; }
  .d1 { width:40px; height:40px; background:#FF7E8E; top:90px; left:-8px; --rot:15deg; opacity:0.18; }
  .d2 { width:28px; height:28px; background:#42B9F5; top:170px; right:12px; --rot:-20deg; opacity:0.15; }
  .d3 { width:50px; height:20px; background:#FFD536; top:440px; left:10px; --rot:25deg; opacity:0.12; }
  .d4 { width:20px; height:50px; background:#5EC97B; top:400px; right:18px; --rot:-10deg; opacity:0.14; }
  .d5 { width:34px; height:34px; background:#A78BDF; bottom:220px; left:15px; --rot:30deg; opacity:0.13; }
  .d6 { width:30px; height:30px; background:#FFAA42; bottom:180px; right:10px; --rot:-25deg; opacity:0.16; }
  .d7 { width:22px; height:22px; background:#42B9F5; bottom:310px; right:35px; --rot:-15deg; opacity:0.1; }

  .glow-orb { position:absolute; border-radius:50%; filter:blur(60px); z-index:1; }
  .go1 { width:200px; height:200px; background:rgba(66,185,245,0.12); top:40px; right:-60px; }
  .go2 { width:250px; height:250px; background:rgba(167,139,223,0.1); bottom:80px; left:-80px; }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 52px 30px 36px;
    position: relative;
    z-index: 2;
  }

  /* ─── Logo ─── */
  .logo-section { text-align: center; margin-bottom: 4px; }

  .logo-blocks { display:flex; gap:6px; justify-content:center; margin-bottom:16px; }

  .logo-block {
    width: 38px; height: 38px; border-radius: 10px;
    position: relative;
    border-bottom: 4px solid rgba(0,0,0,0.3);
  }
  .logo-block::after {
    content:''; position:absolute; top:3px; left:4px; right:6px; height:40%;
    background: rgba(255,255,255,0.28); border-radius:5px;
  }
  .lb1 { background:#FF7E8E; box-shadow:0 0 18px rgba(255,126,142,0.45); }
  .lb2 { background:#FFAA42; box-shadow:0 0 18px rgba(255,170,66,0.45); }
  .lb3 { background:#FFD536; box-shadow:0 0 18px rgba(255,213,54,0.45); }
  .lb4 { background:#5EC97B; box-shadow:0 0 18px rgba(94,201,123,0.45); }
  .lb5 { background:#42B9F5; box-shadow:0 0 18px rgba(66,185,245,0.45); }
  .lb6 { background:#A78BDF; box-shadow:0 0 18px rgba(167,139,223,0.45); }

  .logo-title {
    font-size: 44px; font-weight: 700;
    background: linear-gradient(180deg, #FFFFFF 20%, #d4c6ff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
  }
  .logo-subtitle {
    font-size: 13px; color: #9B8AC4; letter-spacing: 6px;
    text-transform: uppercase; font-weight: 500;
  }

  /* ─── Mini board preview ─── */
  .mini-board {
    margin: 20px 0 8px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 3px;
    width: 180px;
    padding: 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.06);
  }
  .mini-cell {
    width: 100%; aspect-ratio: 1;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
  }
  .mc-filled { opacity: 0.7; border-bottom: 2px solid rgba(0,0,0,0.2); }
  .mc-r { background: #FF7E8E; }
  .mc-o { background: #FFAA42; }
  .mc-y { background: #FFD536; }
  .mc-g { background: #5EC97B; }
  .mc-b { background: #42B9F5; }
  .mc-p { background: #A78BDF; }

  /* ─── Buttons ─── */
  .buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 24px;
  }

  /* Game-style 3D button base */
  .game-btn {
    width: 85%;
    border: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    text-align: center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    letter-spacing: 0.5px;
  }

  /* Primary — big chunky play button */
  .btn-play {
    padding: 20px 28px;
    font-size: 24px;
    color: #fff;
    background: linear-gradient(180deg, #6ddb8a 0%, #3cc462 40%, #2aad50 100%);
    border-radius: 22px;
    border-bottom: 6px solid #1d7a38;
    box-shadow: 0 8px 28px rgba(46,184,92,0.45), inset 0 2px 0 rgba(255,255,255,0.2);
  }
  .btn-play::after {
    content:''; position:absolute; top:0; left:0; right:0; height:45%;
    background:linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    border-radius: 22px 22px 0 0;
  }
  .btn-play-arrow {
    display: inline-block;
    margin-right: 8px;
    font-size: 20px;
  }

  /* Continue — blue */
  .btn-continue {
    padding: 16px 24px;
    font-size: 18px;
    color: #fff;
    background: linear-gradient(180deg, #5cc0f7 0%, #3ba0e0 40%, #2b8ad0 100%);
    border-radius: 18px;
    border-bottom: 5px solid #1a5f8f;
    box-shadow: 0 6px 20px rgba(59,160,224,0.35), inset 0 1.5px 0 rgba(255,255,255,0.2);
  }
  .btn-continue::after {
    content:''; position:absolute; top:0; left:0; right:0; height:45%;
    background:linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
    border-radius:18px 18px 0 0;
  }
  .btn-continue-sub {
    display: block;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.75;
    margin-top: 2px;
  }

  /* Daily — orange/gold */
  .btn-daily {
    padding: 16px 24px;
    font-size: 18px;
    color: #fff;
    background: linear-gradient(180deg, #ffbe4a 0%, #f5a020 40%, #e08a10 100%);
    border-radius: 18px;
    border-bottom: 5px solid #a06008;
    box-shadow: 0 6px 20px rgba(245,160,32,0.35), inset 0 1.5px 0 rgba(255,255,255,0.22);
  }
  .btn-daily::after {
    content:''; position:absolute; top:0; left:0; right:0; height:45%;
    background:linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    border-radius:18px 18px 0 0;
  }
  .btn-daily-badge {
    position: absolute;
    top: -8px; right: -4px;
    background: linear-gradient(135deg, #FF5E6E, #FF3050);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(255,50,80,0.5);
    border: 2px solid #1a1145;
  }

  /* How to play — purple ghost */
  .btn-howto {
    padding: 14px 24px;
    font-size: 16px;
    color: #c8b8ff;
    background: linear-gradient(180deg, rgba(167,139,223,0.25) 0%, rgba(167,139,223,0.12) 100%);
    border-radius: 16px;
    border-bottom: 4px solid rgba(100,70,160,0.4);
    border: 1.5px solid rgba(167,139,223,0.2);
    border-bottom: 4px solid rgba(100,70,160,0.3);
    font-weight: 600;
    text-shadow: none;
    width: 60%;
  }

  /* ─── Stats ─── */
  .stats {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: auto;
    margin-bottom: 12px;
  }
  .stat-card {
    flex: 1;
    background: rgba(0,0,0,0.2);
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 12px 6px;
    text-align: center;
    border-bottom: 3px solid rgba(0,0,0,0.25);
  }
  .stat-icon { font-size: 18px; margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: #7B6BA8; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
  .stat-card:nth-child(1) .stat-value { color: #FFD536; }
  .stat-card:nth-child(2) .stat-value { color: #42B9F5; }
  .stat-card:nth-child(3) .stat-value { color: #5EC97B; }

  /* ─── Bottom ─── */
  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    width: 100%;
  }
  .bottom-btn {
    display: flex; align-items: center; gap: 6px;
    color: #7B6BA8; font-family: 'Fredoka', sans-serif;
    font-size: 14px; font-weight: 500;
    background: none; border: none; cursor: pointer;
    padding: 6px 12px;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="deco-block d1"></div>
  <div class="deco-block d2"></div>
  <div class="deco-block d3"></div>
  <div class="deco-block d4"></div>
  <div class="deco-block d5"></div>
  <div class="deco-block d6"></div>
  <div class="deco-block d7"></div>
  <div class="glow-orb go1"></div>
  <div class="glow-orb go2"></div>

  <div class="container">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-blocks">
        <div class="logo-block lb1"></div>
        <div class="logo-block lb2"></div>
        <div class="logo-block lb3"></div>
        <div class="logo-block lb4"></div>
        <div class="logo-block lb5"></div>
        <div class="logo-block lb6"></div>
      </div>
      <div class="logo-title">ChromaBlocks</div>
      <div class="logo-subtitle">Block Puzzle</div>
    </div>

    <!-- Mini board -->
    <div class="mini-board">
      <div class="mini-cell"></div>
      <div class="mini-cell mc-filled mc-r"></div>
      <div class="mini-cell mc-filled mc-r"></div>
      <div class="mini-cell"></div>
      <div class="mini-cell"></div>
      <div class="mini-cell mc-filled mc-b"></div>
      
      <div class="mini-cell mc-filled mc-o"></div>
      <div class="mini-cell mc-filled mc-r"></div>
      <div class="mini-cell"></div>
      <div class="mini-cell mc-filled mc-g"></div>
      <div class="mini-cell mc-filled mc-g"></div>
      <div class="mini-cell mc-filled mc-b"></div>
      
      <div class="mini-cell mc-filled mc-o"></div>
      <div class="mini-cell mc-filled mc-o"></div>
      <div class="mini-cell mc-filled mc-y"></div>
      <div class="mini-cell mc-filled mc-g"></div>
      <div class="mini-cell"></div>
      <div class="mini-cell"></div>
      
      <div class="mini-cell mc-filled mc-p"></div>
      <div class="mini-cell"></div>
      <div class="mini-cell mc-filled mc-y"></div>
      <div class="mini-cell mc-filled mc-y"></div>
      <div class="mini-cell mc-filled mc-p"></div>
      <div class="mini-cell mc-filled mc-p"></div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="game-btn btn-play">
        <span class="btn-play-arrow">▶</span> PLAY
      </button>

      <button class="game-btn btn-continue">
        ↩ Continue
        <span class="btn-continue-sub">Level 12 · 4,280 pts</span>
      </button>

      <button class="game-btn btn-daily">
        📅 Daily Challenge
        <span class="btn-daily-badge">🔥 7</span>
      </button>

      <button class="game-btn btn-howto">
        📖 How to Play
      </button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-value">12,480</div>
        <div class="stat-label">Best</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-value">47</div>
        <div class="stat-label">Games</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value">3,820</div>
        <div class="stat-label">Avg</div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="bottom-btn">🔊 Sound</button>
      <button class="bottom-btn">⚙️ Settings</button>
    </div>
  </div>
</body>
</html>
